<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>كلية — شبكة التواصل الجامعية</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a08;
      --bg2: #0e0e0b;
      --bg3: #131310;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: #7a6230;
      --gold-faint: rgba(201,168,76,0.08);
      --cream: #f5f0e8;
      --cream-dim: #9a9488;
      --border: rgba(201,168,76,0.12);
      --green: #1a3a2a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Amiri', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.25;
    }

    .app {
      display: grid;
      grid-template-columns: 260px 1fr 300px;
      grid-template-rows: 60px 1fr;
      min-height: 100vh;
    }

    .topnav {
      grid-column: 1 / -1;
      background: rgba(10,10,8,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topnav-logo {
      font-family: 'Scheherazade New', serif;
      font-size: 1.6rem;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(201,168,76,0.3);
      text-decoration: none;
      cursor: pointer;
    }
    .topnav-search {
      flex: 1;
      max-width: 360px;
      margin: 0 32px;
      position: relative;
    }
    .topnav-search input {
      width: 100%;
      background: var(--gold-faint);
      border: 1px solid var(--border);
      color: var(--cream);
      padding: 8px 16px 8px 40px;
      font-family: 'Amiri', serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s;
      border-radius: 2px;
      text-align: right;
    }
    .topnav-search input:focus { border-color: var(--gold); }
    .topnav-search input::placeholder { color: var(--cream-dim); opacity: 0.5; }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold-dim);
      font-size: 0.8rem;
    }
    .topnav-actions {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .nav-icon-btn {
      background: none;
      border: none;
      color: var(--cream-dim);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 6px;
      transition: color 0.2s;
      position: relative;
    }
    .nav-icon-btn:hover { color: var(--gold); }
    .nav-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
    }
    .topnav-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dim), #2d6e4e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Scheherazade New', serif;
      font-size: 1rem;
      color: var(--cream);
      cursor: pointer;
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    .topnav-avatar:hover { border-color: var(--gold); }

    .sidebar-left {
      background: var(--bg2);
      border-left: 1px solid var(--border);
      padding: 24px 0;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }
    .sidebar-left::-webkit-scrollbar { width: 0; }

    .sidebar-profile {
      padding: 0 20px 24px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .profile-avatar-lg {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dim), #2d6e4e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Scheherazade New', serif;
      font-size: 1.5rem;
      color: var(--cream);
      margin: 0 auto 12px;
      border: 2px solid var(--gold-dim);
    }
    .profile-name {
      font-family: 'Scheherazade New', serif;
      font-size: 1.1rem;
      color: var(--cream);
      margin-bottom: 4px;
    }
    .profile-stats {
      display: flex;
      justify-content: space-around;
      margin-top: 16px;
    }
    .stat { text-align: center; }
    .stat-num {
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      color: var(--gold);
      display: block;
    }
    .stat-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      color: var(--cream-dim);
      letter-spacing: 0.05em;
    }

    .sidebar-nav {
      padding: 16px 0;
    }
    .sidebar-nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 24px;
      color: var(--cream-dim);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      border-right: 3px solid transparent;
      text-decoration: none;
    }
    .sidebar-nav-item:hover {
      color: var(--cream);
      background: var(--gold-faint);
    }
    .sidebar-nav-item.active {
      color: var(--gold);
      border-right-color: var(--gold);
      background: var(--gold-faint);
    }
    .nav-item-icon { font-size: 1.1rem; width: 24px; text-align: center; }
    .nav-item-label { font-family: 'Amiri', serif; font-size: 1rem; }
    .nav-item-count {
      margin-right: auto;
      background: var(--gold-dim);
      color: var(--cream);
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 700;
    }

    main {
      background: var(--bg);
      padding: 0;
      overflow-y: auto;
      height: calc(100vh - 60px);
    }
    main::-webkit-scrollbar { width: 6px; }
    main::-webkit-scrollbar-track { background: var(--bg2); }
    main::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }

    .view {
      display: none;
    }
    .view.active {
      display: block;
    }

    #feedView {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px;
    }

    .feed-tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--cream-dim);
      padding: 12px 16px;
      cursor: pointer;
      font-family: 'Amiri', serif;
      font-size: 0.95rem;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }

    .tab-btn:hover { color: var(--cream); }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .compose-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 2px;
    }

    .compose-header {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .compose-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dim), #2d6e4e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Scheherazade New', serif;
      font-size: 1rem;
      color: var(--cream);
      flex-shrink: 0;
    }

    .compose-input-area {
      flex: 1;
    }

    .compose-input {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--cream);
      font-family: 'Amiri', serif;
      font-size: 1rem;
      outline: none;
      resize: none;
      min-height: 60px;
      text-align: right;
    }

    .compose-input::placeholder { color: var(--cream-dim); }

    .compose-actions {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .compose-btn {
      flex: 1;
      background: var(--gold);
      color: var(--bg);
      border: none;
      padding: 10px;
      font-family: 'Amiri', serif;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .compose-btn:hover { background: var(--gold-light); }

    .icon-btn {
      background: var(--gold-faint);
      border: 1px solid var(--border);
      color: var(--gold);
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .icon-btn:hover { background: var(--gold-dim); color: var(--cream); }

    .post {
      background: var(--bg2);
      border: 1px solid var(--border);
      margin-bottom: 16px;
      border-radius: 2px;
      overflow: hidden;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .post-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dim), #2d6e4e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Scheherazade New', serif;
      font-size: 1rem;
      color: var(--cream);
      cursor: pointer;
      flex-shrink: 0;
    }

    .post-info {
      flex: 1;
      text-align: right;
    }

    .post-name {
      font-family: 'Scheherazade New', serif;
      font-size: 0.95rem;
      color: var(--cream);
      cursor: pointer;
    }

    .post-username {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--cream-dim);
    }

    .post-content {
      padding: 16px;
      line-height: 1.6;
    }

    .post-image {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
    }

    .post-actions {
      display: flex;
      justify-content: space-around;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      gap: 8px;
    }

    .post-action-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--cream-dim);
      padding: 8px;
      cursor: pointer;
      font-family: 'Amiri', serif;
      font-size: 0.9rem;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .post-action-btn:hover { color: var(--gold); }

    .post-action-btn.liked { color: #e05c7a; }

    .comments-section {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: rgba(10, 10, 8, 0.5);
    }

    .comment {
      margin-bottom: 12px;
      padding: 8px;
      background: var(--bg3);
      border-radius: 2px;
    }

    .comment-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .comment-name {
      font-family: 'Scheherazade New', serif;
      font-size: 0.85rem;
      color: var(--cream);
      cursor: pointer;
    }

    .comment-text {
      font-size: 0.9rem;
      color: var(--cream-dim);
    }

    .comment-input-area {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .comment-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--cream);
      padding: 8px 12px;
      font-family: 'Amiri', serif;
      outline: none;
      text-align: right;
    }

    .comment-input:focus { border-color: var(--gold); }

    .comment-btn {
      background: var(--gold);
      color: var(--bg);
      border: none;
      padding: 8px 16px;
      cursor: pointer;
      font-family: 'Amiri', serif;
      font-weight: 700;
    }

    .right-sidebar {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 20px;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }
    .right-sidebar::-webkit-scrollbar { width: 0; }

    .sidebar-section {
      margin-bottom: 28px;
    }

    .sidebar-title {
      font-family: 'Scheherazade New', serif;
      font-size: 1rem;
      color: var(--cream);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-item {
      padding: 8px 0;
      color: var(--cream-dim);
      font-size: 0.9rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .sidebar-item:hover { color: var(--gold); }

    .channel-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .channel-card:hover {
      background: var(--gold-faint);
      border-color: var(--gold-dim);
    }

    .channel-name {
      font-family: 'Scheherazade New', serif;
      color: var(--cream);
      margin-bottom: 4px;
    }

    .channel-members {
      font-size: 0.75rem;
      color: var(--cream-dim);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 28px;
      max-width: 500px;
      width: 90%;
      border-radius: 2px;
    }

    .modal-title {
      font-family: 'Scheherazade New', serif;
      font-size: 1.3rem;
      color: var(--cream);
      margin-bottom: 16px;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: var(--cream-dim);
      font-size: 1.2rem;
      cursor: pointer;
    }

    .modal-close:hover { color: var(--gold); }

    .dm-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dm-item {
      padding: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dm-item:hover {
      background: var(--gold-faint);
      border-color: var(--gold-dim);
    }

    .dm-item.active {
      background: var(--gold-faint);
      border-color: var(--gold);
    }

    .dm-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dim), #2d6e4e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: var(--cream);
      flex-shrink: 0;
    }

    .dm-info {
      flex: 1;
      text-align: right;
      min-width: 0;
    }

    .dm-name {
      font-family: 'Scheherazade New', serif;
      color: var(--cream);
      font-size: 0.9rem;
      margin-bottom: 2px;
    }

    .dm-preview {
      font-size: 0.75rem;
      color: var(--cream-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .messages-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    .message {
      padding: 8px 12px;
      background: var(--bg3);
      border-radius: 2px;
      font-size: 0.9rem;
      word-wrap: break-word;
    }

    .message.sent {
      background: var(--gold-faint);
      color: var(--cream);
      text-align: right;
    }

    .message.received {
      background: var(--bg3);
      color: var(--cream-dim);
    }

    .message-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--cream);
      padding: 10px;
      font-family: 'Amiri', serif;
      outline: none;
      text-align: right;
      resize: none;
      min-height: 40px;
      max-height: 100px;
    }

    .message-input:focus { border-color: var(--gold); }

    .message-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .message-send-btn {
      flex: 1;
      background: var(--gold);
      color: var(--bg);
      border: none;
      padding: 10px;
      cursor: pointer;
      font-family: 'Amiri', serif;
      font-weight: 700;
    }

    .message-send-btn:hover { background: var(--gold-light); }

    .notif-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .notif-item {
      padding: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      border-right: 3px solid transparent;
    }

    .notif-item:hover { background: var(--gold-faint); }

    .notif-item.unread {
      background: rgba(201, 168, 76, 0.1);
      border-right-color: var(--gold);
    }

    .notif-text {
      color: var(--cream);
      font-size: 0.9rem;
      margin-bottom: 4px;
    }

    .notif-time {
      font-size: 0.7rem;
      color: var(--cream-dim);
    }

    @media (max-width: 1200px) {
      .app {
        grid-template-columns: 200px 1fr;
      }
      .right-sidebar {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar-left {
        display: none;
      }
      .right-sidebar {
        display: none;
      }
      .topnav-search {
        display: none;
      }
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--cream-dim);
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--gold-dim);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .logout-btn {
      width: 100%;
      background: #c94c4c;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      font-family: 'Amiri', serif;
      margin-top: 16px;
    }

    .logout-btn:hover { background: #e05c7a; }
  </style>
</head>
<body>

<div class="app">
  <div class="topnav">
    <span class="topnav-logo">كلية</span>
    <div class="topnav-search">
      <input type="text" placeholder="ابحث عن منشورات..." id="searchInput"/>
      <span class="search-icon">🔍</span>
    </div>
    <div class="topnav-actions">
      <button class="nav-icon-btn" onclick="switchView('notifications')" title="الإشعارات">
        🔔
        <div class="nav-badge" id="notifBadge" style="display: none;"></div>
      </button>
      <div class="topnav-avatar" onclick="showProfileMenu()" id="topAvatar">أ</div>
    </div>
  </div>

  <div class="sidebar-left">
    <div class="sidebar-profile">
      <div class="profile-avatar-lg" id="profileAvatar">أ</div>
      <div class="profile-name" id="profileName">المستخدم</div>
      <div class="profile-stats">
        <div class="stat">
          <span class="stat-num" id="postCount">0</span>
          <span class="stat-label">منشورات</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="followCount">0</span>
          <span class="stat-label">متابعون</span>
        </div>
      </div>
    </div>

    <div class="sidebar-nav">
      <div class="sidebar-nav-item active" onclick="switchView('feed')">
        <span class="nav-item-icon">🏠</span>
        <span class="nav-item-label">الرسائل</span>
      </div>
      <div class="sidebar-nav-item" onclick="switchView('channels')">
        <span class="nav-item-icon">📢</span>
        <span class="nav-item-label">قنواتي</span>
      </div>
      <div class="sidebar-nav-item" onclick="switchView('messages')">
        <span class="nav-item-icon">💬</span>
        <span class="nav-item-label">الرسائل المباشرة</span>
      </div>
      <div class="sidebar-nav-item" onclick="switchView('explore')">
        <span class="nav-item-icon">🔍</span>
        <span class="nav-item-label">استكشاف</span>
      </div>
      <div class="sidebar-nav-item" onclick="switchView('settings')">
        <span class="nav-item-icon">⚙️</span>
        <span class="nav-item-label">الإعدادات</span>
      </div>
      <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
    </div>
  </div>

  <main>
    <!-- FEED VIEW -->
    <div id="feedView" class="view active">
      <div class="feed-tabs">
        <button class="tab-btn active" onclick="switchFeedTab('الرسائل', this)">الرسائل</button>
        <button class="tab-btn" onclick="switchFeedTab('جامعتي', this)">جامعتي</button>
        <button class="tab-btn" onclick="switchFeedTab('متابعاتي', this)">متابعاتي</button>
      </div>

      <div class="compose-box">
        <div class="compose-header">
          <div class="compose-avatar" id="composeAvatar">أ</div>
          <div class="compose-input-area">
            <textarea class="compose-input" id="postInput" placeholder="شارك أفكارك..."></textarea>
          </div>
        </div>
        <div class="compose-actions">
          <button class="icon-btn" onclick="document.getElementById('postImageInput').click()">🖼️</button>
          <input type="file" id="postImageInput" accept="image/*" style="display: none;" onchange="handlePostImage(this)">
          <button class="compose-btn" onclick="createPost()">منشور</button>
        </div>
      </div>

      <div id="feedPosts" style="min-height: 200px;"></div>
    </div>

    <!-- CHANNELS VIEW -->
    <div id="channelsView" class="view" style="max-width: 680px; margin: 0 auto; padding: 20px;">
      <h2 style="margin-bottom: 20px;">قنواتي</h2>
      <div id="channelsList" style="display: flex; flex-direction: column; gap: 12px;"></div>
    </div>

    <!-- MESSAGES VIEW -->
    <div id="messagesView" class="view" style="max-width: 680px; margin: 0 auto; padding: 20px;">
      <h2 style="margin-bottom: 20px;">الرسائل المباشرة</h2>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
        <div>
          <h3 style="margin-bottom: 12px; font-size: 0.95rem;">المحادثات</h3>
          <div id="dmConversations" class="dm-list"></div>
        </div>
        <div>
          <h3 id="dmChatName" style="margin-bottom: 12px; font-size: 0.95rem;">اختر محادثة</h3>
          <div id="dmMessages" class="messages-container" style="min-height: 300px;"></div>
          <div class="compose-actions" style="flex-direction: column;">
            <textarea class="message-input" id="dmInput" placeholder="أكتب رسالة..."></textarea>
            <button class="message-send-btn" onclick="sendDM()">إرسال</button>
          </div>
        </div>
      </div>
    </div>

    <!-- NOTIFICATIONS VIEW -->
    <div id="notificationsView" class="view" style="max-width: 680px; margin: 0 auto; padding: 20px;">
      <h2 style="margin-bottom: 20px;">الإشعارات</h2>
      <div id="notificationsList" class="notif-list"></div>
    </div>

    <!-- EXPLORE VIEW -->
    <div id="exploreView" class="view" style="max-width: 680px; margin: 0 auto; padding: 20px;">
      <h2 style="margin-bottom: 20px;">استكشاف</h2>
      <div id="explorePosts"></div>
    </div>

    <!-- SETTINGS VIEW -->
    <div id="settingsView" class="view" style="max-width: 680px; margin: 0 auto; padding: 20px;">
      <h2 style="margin-bottom: 20px;">الإعدادات</h2>
      <div style="display: flex; flex-direction: column; gap: 16px;">
        <div style="background: var(--bg2); border: 1px solid var(--border); padding: 16px;">
          <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
            <input type="checkbox" checked>
            <span>الإشعارات مفعلة</span>
          </label>
        </div>
        <div style="background: var(--bg2); border: 1px solid var(--border); padding: 16px;">
          <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
            <input type="checkbox" checked>
            <span>عرض الملف الشخصي للجميع</span>
          </label>
        </div>
      </div>
    </div>
  </main>

  <div class="right-sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">التريند الآن</div>
      <div class="sidebar-item">📚 الدراسة</div>
      <div class="sidebar-item">🎓 الجامعة</div>
      <div class="sidebar-item">🚀 التكنولوجيا</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">قنوات مقترحة</div>
      <div id="suggestedChannels"></div>
    </div>
  </div>
</div>

<!-- PROFILE MENU MODAL -->
<div id="profileMenuModal" class="modal" onclick="if(event.target === this) this.classList.remove('active')">
  <div class="modal-content">
    <button class="modal-close" onclick="document.getElementById('profileMenuModal').classList.remove('active')">×</button>
    <h2 class="modal-title" id="modalProfileName">المستخدم</h2>
    <p id="modalProfileUsername" style="color: var(--cream-dim); margin-bottom: 16px;">@user</p>
    <div style="display: flex; flex-direction: column; gap: 12px;">
      <div style="padding: 12px; background: var(--bg3); border: 1px solid var(--border);">
        <strong>إحصائيات</strong>
        <div style="margin-top: 8px; font-size: 0.9rem;">
          <div>المنشورات: <span id="modalPostCount">0</span></div>
          <div>المتابعون: <span id="modalFollowCount">0</span></div>
        </div>
      </div>
      <button class="compose-btn" onclick="goToAdminPanel()" style="display: none;" id="adminBtn">🛡️ لوحة الإدارة</button>
    </div>
  </div>
</div>

<script>
let currentUser = null;
let currentDM = null;
let postImage = null;
let currentFeedTab = 'الرسائل';

// ==================== AUTH ====================
async function checkAuth() {
  try {
    const res = await fetch('/api/me');
    const data = await res.json();
    
    if (!data.user) {
      window.location.href = '/login';
      return;
    }
    
    currentUser = data.user;
    updateUIWithUser();
    loadFeed();
    loadChannels();
    loadConversations();
    loadNotifications();
  } catch (e) {
    console.error('Auth check failed:', e);
    window.location.href = '/login';
  }
}

function updateUIWithUser() {
  const avatar = currentUser.avatar || currentUser.username[0];
  document.getElementById('profileName').textContent = currentUser.fullName;
  document.getElementById('profileAvatar').textContent = avatar;
  document.getElementById('composeAvatar').textContent = avatar;
  document.getElementById('topAvatar').textContent = avatar;
  document.getElementById('modalProfileName').textContent = currentUser.fullName;
  document.getElementById('modalProfileUsername').textContent = '@' + currentUser.username;
  
  if (currentUser.isAdmin) {
    document.getElementById('adminBtn').style.display = 'block';
  }
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login';
}

// ==================== VIEW SWITCHING ====================
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(view + 'View').classList.add('active');
  
  document.querySelectorAll('.sidebar-nav-item').forEach(item => item.classList.remove('active'));
  event.target.closest('.sidebar-nav-item')?.classList.add('active');
  
  if (view === 'feed') loadFeed();
  else if (view === 'channels') loadChannels();
  else if (view === 'messages') loadConversations();
  else if (view === 'notifications') loadNotifications();
  else if (view === 'explore') loadExplorePosts();
}

function switchFeedTab(tab, btn) {
  currentFeedTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadFeed();
}

// ==================== POSTS ====================
async function createPost() {
  const content = document.getElementById('postInput').value.trim();
  
  if (!content) {
    alert('الرجاء كتابة شيء ما');
    return;
  }
  
  try {
    const res = await fetch('/api/posts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        content,
        image: postImage,
        channel: currentFeedTab
      })
    });
    
    const data = await res.json();
    if (data.success) {
      document.getElementById('postInput').value = '';
      postImage = null;
      loadFeed();
    }
  } catch (e) {
    alert('خطأ في إنشاء المنشور');
  }
}

async function loadFeed() {
  const container = document.getElementById('feedPosts');
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  
  try {
    const res = await fetch(`/api/posts?channel=${encodeURIComponent(currentFeedTab)}`);
    const data = await res.json();
    
    container.innerHTML = '';
    if (data.posts.length === 0) {
      container.innerHTML = '<p style="text-align: center; padding: 40px; color: var(--cream-dim);">لا توجد منشورات حتى الآن</p>';
      return;
    }
    
    data.posts.forEach(post => {
      container.appendChild(createPostElement(post));
    });
  } catch (e) {
    container.innerHTML = '<p style="color: #e05c7a;">خطأ في تحميل المنشورات</p>';
  }
}

function createPostElement(post) {
  const div = document.createElement('div');
  div.className = 'post';
  
  const isLiked = post.likes.includes(currentUser.id);
  const isSaved = post.saves.includes(currentUser.id);
  
  div.innerHTML = `
    <div class="post-header">
      <div class="post-avatar">${post.avatar}</div>
      <div class="post-info">
        <div class="post-name">${post.fullName}</div>
        <div class="post-username">@${post.username}</div>
      </div>
    </div>
    <div class="post-content">
      ${post.content}
      ${post.image ? `<img src="${post.image}" class="post-image" style="margin-top: 12px;">` : ''}
    </div>
    <div class="post-actions">
      <button class="post-action-btn ${isLiked ? 'liked' : ''}" onclick="likePost('${post.id}', this)">
        ❤️ <span>${post.likes.length}</span>
      </button>
      <button class="post-action-btn" onclick="toggleComments('${post.id}', this)">
        💬 <span>${post.comments.length}</span>
      </button>
      <button class="post-action-btn ${isSaved ? 'liked' : ''}" onclick="savePost('${post.id}', this)">
        🔖 حفظ
      </button>
      ${post.userId === currentUser.id || currentUser.isAdmin ? `
        <button class="post-action-btn" onclick="deletePost('${post.id}')" style="color: #e05c7a;">
          🗑️ حذف
        </button>
      ` : ''}
    </div>
    <div id="comments-${post.id}"></div>
  `;
  
  return div;
}

async function likePost(postId, btn) {
  try {
    const res = await fetch('/api/likes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ postId })
    });
    
    const data = await res.json();
    if (data.success) {
      btn.classList.toggle('liked');
      btn.querySelector('span').textContent = data.likes.length;
    }
  } catch (e) {
    alert('خطأ');
  }
}

async function savePost(postId, btn) {
  try {
    const res = await fetch('/api/saves', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ postId })
    });
    
    const data = await res.json();
    if (data.success) {
      btn.classList.toggle('liked');
    }
  } catch (e) {
    alert('خطأ');
  }
}

async function toggleComments(postId, btn) {
  const container = document.getElementById(`comments-${postId}`);
  
  if (container.querySelector('.comments-section')) {
    container.innerHTML = '';
  } else {
    try {
      const res = await fetch(`/api/comments/${postId}`);
      const data = await res.json();
      
      let html = '<div class="comments-section">';
      
      data.comments.forEach(comment => {
        html += `
          <div class="comment">
            <div class="comment-header">
              <span class="comment-name">${comment.fullName}</span>
              <span style="font-size: 0.7rem; color: var(--cream-dim);">@${comment.username}</span>
            </div>
            <div class="comment-text">${comment.content}</div>
            ${comment.userId === currentUser.id || currentUser.isAdmin ? `
              <button style="background: none; border: none; color: #e05c7a; font-size: 0.7rem; cursor: pointer; margin-top: 4px;" onclick="deleteComment('${postId}', '${comment.id}')">حذف</button>
            ` : ''}
          </div>
        `;
      });
      
      html += `
        <div class="comment-input-area">
          <input type="text" class="comment-input" placeholder="أضف تعليق..." id="commentInput-${postId}">
          <button class="comment-btn" onclick="addComment('${postId}')">✓</button>
        </div>
      </div>`;
      
      container.innerHTML = html;
    } catch (e) {
      alert('خطأ');
    }
  }
}

async function addComment(postId) {
  const input = document.getElementById(`commentInput-${postId}`);
  const content = input.value.trim();
  
  if (!content) return;
  
  try {
    const res = await fetch('/api/comments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ postId, content })
    });
    
    const data = await res.json();
    if (data.success) {
      toggleComments(postId, null);
      toggleComments(postId, null);
    }
  } catch (e) {
    alert('خطأ');
  }
}

async function deleteComment(postId, commentId) {
  try {
    await fetch(`/api/comments/${commentId}`, { method: 'DELETE' });
    toggleComments(postId, null);
    toggleComments(postId, null);
  } catch (e) {
    alert('خطأ');
  }
}

async function deletePost(postId) {
  if (!confirm('هل تريد حذف هذا المنشور؟')) return;
  
  try {
    await fetch(`/api/posts/${postId}`, { method: 'DELETE' });
    loadFeed();
  } catch (e) {
    alert('خطأ');
  }
}

function handlePostImage(input) {
  if (!input.files[0]) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    postImage = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

// ==================== CHANNELS ====================
async function loadChannels() {
  const container = document.getElementById('channelsList');
  
  try {
    const res = await fetch('/api/channels');
    const data = await res.json();
    
    container.innerHTML = '';
    data.channels.forEach(channel => {
      const div = document.createElement('div');
      div.className = 'channel-card';
      div.innerHTML = `
        <div style="display: flex; gap: 12px; align-items: center;">
          <div style="font-size: 1.5rem;">${channel.icon}</div>
          <div>
            <div class="channel-name">${channel.name}</div>
            <div class="channel-members">${channel.members.length} عضو${channel.official ? ' · رسمية' : ''}</div>
          </div>
        </div>
        <div style="font-size: 0.85rem; margin-top: 8px; color: var(--cream-dim);">${channel.description}</div>
      `;
      container.appendChild(div);
    });
  } catch (e) {
    container.innerHTML = '<p style="color: #e05c7a;">خطأ في تحميل القنوات</p>';
  }
}

// ==================== MESSAGES ====================
async function loadConversations() {
  const container = document.getElementById('dmConversations');
  
  try {
    const res = await fetch('/api/conversations');
    const data = await res.json();
    
    container.innerHTML = '';
    if (data.conversations.length === 0) {
      container.innerHTML = '<p style="color: var(--cream-dim); text-align: center;">لا توجد محادثات</p>';
      return;
    }
    
    data.conversations.forEach(conv => {
      const div = document.createElement('div');
      div.className = 'dm-item';
      div.onclick = () => openDM(conv.userId);
      div.innerHTML = `
        <div class="dm-avatar">${conv.avatar}</div>
        <div class="dm-info">
          <div class="dm-name">${conv.name}</div>
          <div class="dm-preview">${conv.lastMessage}</div>
        </div>
      `;
      container.appendChild(div);
    });
  } catch (e) {
    container.innerHTML = '<p style="color: #e05c7a;">خطأ في تحميل المحادثات</p>';
  }
}

async function openDM(userId) {
  currentDM = userId;
  
  document.querySelectorAll('.dm-item').forEach(item => item.classList.remove('active'));
  event.target.closest('.dm-item')?.classList.add('active');
  
  try {
    const res = await fetch(`/api/messages/${userId}`);
    const data = await res.json();
    
    const container = document.getElementById('dmMessages');
    container.innerHTML = '';
    
    data.messages.forEach(msg => {
      const div = document.createElement('div');
      div.className = `message ${msg.senderId === currentUser.id ? 'sent' : 'received'}`;
      div.textContent = msg.content;
      container.appendChild(div);
    });
    
    container.scrollTop = container.scrollHeight;
  } catch (e) {
    alert('خطأ');
  }
}

async function sendDM() {
  const input = document.getElementById('dmInput');
  const content = input.value.trim();
  
  if (!content || !currentDM) return;
  
  try {
    await fetch('/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        recipientId: currentDM,
        content,
        image: null
      })
    });
    
    input.value = '';
    openDM(currentDM);
  } catch (e) {
    alert('خطأ');
  }
}

// ==================== NOTIFICATIONS ====================
async function loadNotifications() {
  const container = document.getElementById('notificationsList');
  
  try {
    const res = await fetch('/api/notifications');
    const data = await res.json();
    
    container.innerHTML = '';
    if (data.notifications.length === 0) {
      container.innerHTML = '<p style="color: var(--cream-dim); text-align: center;">لا توجد إشعارات</p>';
      return;
    }
    
    data.notifications.forEach(notif => {
      const div = document.createElement('div');
      div.className = `notif-item ${notif.read ? '' : 'unread'}`;
      div.innerHTML = `
        <div class="notif-text">${notif.actor} ${notif.type === 'comment' ? 'علّق على منشورك' : 'اتبعك'}</div>
        <div class="notif-time">${new Date(notif.timestamp).toLocaleString('ar')}</div>
      `;
      container.appendChild(div);
    });
  } catch (e) {
    container.innerHTML = '<p style="color: #e05c7a;">خطأ</p>';
  }
}

// ==================== EXPLORE ====================
async function loadExplorePosts() {
  const container = document.getElementById('explorePosts');
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  
  try {
    const res = await fetch('/api/posts?channel=جامعتي');
    const data = await res.json();
    
    container.innerHTML = '';
    if (data.posts.length === 0) {
      container.innerHTML = '<p style="text-align: center; padding: 40px;">لا توجد منشورات</p>';
      return;
    }
    
    data.posts.forEach(post => {
      container.appendChild(createPostElement(post));
    });
  } catch (e) {
    container.innerHTML = '<p style="color: #e05c7a;">خطأ</p>';
  }
}

// ==================== PROFILE MENU ====================
function showProfileMenu() {
  document.getElementById('profileMenuModal').classList.add('active');
}

function goToAdminPanel() {
  if (currentUser.isAdmin) {
    window.location.href = '/admin';
  }
}

// Initialize on load
document.addEventListener('DOMContentLoaded', checkAuth);
</script>

</body>
</html>
